<!DOCTYPE html>
<html>
<head>
    <title>Smart Plant Water Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌱 Smart Plant Water Reminder</h1>
<h3 id="clock"></h3>
<div class="container">

<label>Plant Name</label>
<input type="text" id="plant" placeholder="Enter Plant Name">

<label>Water Time</label>
<input type="time" id="time">

<button onclick="saveReminder()">Save Reminder</button>

<h2 id="result"></h2>
<h2>Saved Reminders</h2>
<ul id="plantList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
